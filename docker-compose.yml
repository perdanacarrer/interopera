services:
  firm_a:
    build: .
    command: python main.py --firm firm_A
    volumes:
      - ./reports:/app/reports
      - ./audit:/app/audit
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

  firm_b:
    build: .
    command: python main.py --firm firm_B
    volumes:
      - ./reports:/app/reports
      - ./audit:/app/audit
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      firm_a:
        condition: service_completed_successfully
